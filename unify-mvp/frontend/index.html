<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unify MVP Chat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Unify</h1>
      <p class="subtitle">Mobile-first multilingual messaging MVP</p>

      <section class="card" id="auth-card">
        <h2>Authentication</h2>
        <div class="tabs">
          <button id="show-login" class="active">Login</button>
          <button id="show-register">Register</button>
        </div>

        <form id="login-form" class="form active">
          <input type="email" id="login-email" placeholder="Email" required />
          <input type="password" id="login-password" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>

        <form id="register-form" class="form">
          <input type="email" id="register-email" placeholder="Email" required />
          <input type="password" id="register-password" placeholder="Password" required />
          <input type="text" id="register-language" placeholder="Preferred language (en/fr/es)" value="en" required />
          <button type="submit">Register</button>
        </form>
      </section>

      <section class="card hidden" id="chat-card">
        <h2>Chat</h2>
        <label for="user-select">Send to:</label>
        <select id="user-select"></select>

        <div id="messages" class="messages"></div>

        <form id="message-form" class="message-form">
          <input type="text" id="message-input" placeholder="Type your message" required />
          <button type="submit">Send</button>
        </form>
      </section>

      <p id="status" class="status"></p>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
